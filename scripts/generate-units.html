<!DOCTYPE html>
<html>
<head><title>프리블라인드 유닛 생성기</title></head>
<body>
<h2>프리블라인드 U자 유닛 PNG 생성</h2>
<p>각 색상 클릭하면 다운로드됩니다. public/images/units/ 에 저장하세요.</p>
<div id="previews" style="display:flex;flex-wrap:wrap;gap:20px;"></div>
<script>
const COLORS = [
  { name: 'pure-white', hex: '#FFFFFF' },
  { name: 'milk-white', hex: '#F5F0E8' },
  { name: 'ivory', hex: '#EEDFCC' },
  { name: 'cream', hex: '#F5E6C8' },
  { name: 'beige', hex: '#D4C5A9' },
  { name: 'latte', hex: '#C4A882' },
  { name: 'mocha', hex: '#967259' },
  { name: 'light-gray', hex: '#D0CFC9' },
  { name: 'gray', hex: '#9E9E9E' },
  { name: 'charcoal', hex: '#5C5C5C' },
];

// 유닛 크기 고정 (775mm 비율)
const UNIT_W = 200;
const UNIT_H = 300;
const RAIL_H = 10;
const PIPING = 2.5;

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function drawUnit(colorHex) {
  const canvas = document.createElement('canvas');
  canvas.width = UNIT_W;
  canvas.height = UNIT_H;
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0, 0, UNIT_W, UNIT_H);

  const {r,g,b} = hexToRgb(colorHex);
  const arcRadius = (UNIT_W - 8) / 2;
  const cx = UNIT_W / 2;
  const arcCenterY = RAIL_H + UNIT_H * 0.55;

  // 레일
  const railGrad = ctx.createLinearGradient(0, 0, 0, RAIL_H);
  railGrad.addColorStop(0, '#A0927E');
  railGrad.addColorStop(0.5, '#8B7D6B');
  railGrad.addColorStop(1, '#7A6C5A');
  ctx.fillStyle = railGrad;
  ctx.roundRect(2, 0, UNIT_W - 4, RAIL_H, [3, 3, 0, 0]);
  ctx.fill();

  // 레일 하이라이트
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(4, 1, UNIT_W - 8, 2);

  // 원단 경로 (사각형 상단 + 하단 반원)
  ctx.beginPath();
  ctx.moveTo(4, RAIL_H);
  ctx.lineTo(4, arcCenterY);
  ctx.arc(cx, arcCenterY, arcRadius, Math.PI, 0, false);
  ctx.lineTo(UNIT_W - 4, RAIL_H);
  ctx.closePath();

  // 원단 그라데이션 (상단 약간 더 진하게 → 하단 밝게)
  const fabricGrad = ctx.createLinearGradient(0, RAIL_H, 0, arcCenterY + arcRadius);
  fabricGrad.addColorStop(0, `rgba(${r},${g},${b},0.40)`);
  fabricGrad.addColorStop(0.4, `rgba(${r},${g},${b},0.32)`);
  fabricGrad.addColorStop(0.8, `rgba(${r},${g},${b},0.25)`);
  fabricGrad.addColorStop(1, `rgba(${r},${g},${b},0.18)`);
  ctx.fillStyle = fabricGrad;
  ctx.fill();

  // 원단 미세한 텍스처 (세로 줄)
  ctx.save();
  ctx.clip();
  ctx.strokeStyle = `rgba(${r},${g},${b},0.08)`;
  ctx.lineWidth = 0.5;
  for (let x = 8; x < UNIT_W - 4; x += 6) {
    ctx.beginPath();
    ctx.moveTo(x, RAIL_H);
    ctx.lineTo(x, arcCenterY + arcRadius);
    ctx.stroke();
  }
  ctx.restore();

  // U자 하단 파이핑 (다크 브론즈)
  ctx.beginPath();
  ctx.arc(cx, arcCenterY, arcRadius, Math.PI, 0, false);
  const pipingGrad = ctx.createLinearGradient(4, arcCenterY, UNIT_W - 4, arcCenterY);
  pipingGrad.addColorStop(0, '#6B5D4E');
  pipingGrad.addColorStop(0.5, '#8B7D6B');
  pipingGrad.addColorStop(1, '#6B5D4E');
  ctx.strokeStyle = pipingGrad;
  ctx.lineWidth = PIPING;
  ctx.stroke();

  // 양쪽 세로 라인 (매우 얇게)
  ctx.strokeStyle = 'rgba(107,93,78,0.3)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(4, RAIL_H);
  ctx.lineTo(4, arcCenterY);
  ctx.moveTo(UNIT_W - 4, RAIL_H);
  ctx.lineTo(UNIT_W - 4, arcCenterY);
  ctx.stroke();

  return canvas;
}

// 모든 색상 생성 및 미리보기
const container = document.getElementById('previews');
COLORS.forEach(c => {
  const canvas = drawUnit(c.hex);
  const div = document.createElement('div');
  div.style.textAlign = 'center';

  const label = document.createElement('p');
  label.textContent = c.name;
  label.style.fontSize = '12px';
  label.style.fontWeight = 'bold';

  const img = document.createElement('img');
  img.src = canvas.toDataURL('image/png');
  img.style.border = '1px solid #ccc';
  img.style.background = 'repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 0 0 / 20px 20px';
  img.style.width = '100px';
  img.style.cursor = 'pointer';
  img.onclick = () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `unit-${c.name}.png`;
    a.click();
  };

  div.appendChild(img);
  div.appendChild(label);
  container.appendChild(div);
});

// 자동으로 모든 유닛 다운로드 가능하도록
async function downloadAll() {
  for (const c of COLORS) {
    const canvas = drawUnit(c.hex);
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `unit-${c.name}.png`;
    a.click();
    await new Promise(r => setTimeout(r, 300));
  }
}
</script>
<br>
<button onclick="downloadAll()" style="padding:10px 20px;font-size:16px;">전체 다운로드</button>
</body>
</html>
